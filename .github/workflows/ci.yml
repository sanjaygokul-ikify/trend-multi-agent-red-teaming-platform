name: CI Pipeline
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with: { python-version: '3.11' }
      - run: pip install poetry
      - run: poetry install
      - run: make test
      - run: make lint