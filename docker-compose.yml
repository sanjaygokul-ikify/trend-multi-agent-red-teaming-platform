services:
  orchestrator:
    build: ./orchestrator
    ports: 
      - "8080:8080"
    environment:
      - AGENT_REGISTRY=redis://redis:6379/0
  redis:
    image: redis:6.2.6
    ports:
      - "6379:6379"
  agent-worker:
    build: ./agent-worker
    depends_on:
      - redis
    environment:
      - WORKER_MODE=red-team-simulator